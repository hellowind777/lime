name: PR Gate

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "src-tauri/**"
      - "scripts/**"
      - "eslint.config.js"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "tailwind.config.js"
      - "postcss.config.js"
      - "vite.config.ts"
      - "index.html"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "src-tauri/**"
      - "scripts/**"
      - "eslint.config.js"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "tailwind.config.js"
      - "postcss.config.js"
      - "vite.config.ts"
      - "index.html"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend Verify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Vitest
        run: npm test

  bridge:
    name: Bridge & Contracts Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run bridge tests
        run: npm run test:bridge

      - name: Run command contracts
        run: npm run test:contracts

  rust:
    name: Rust Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: pr-gate-rust-ubuntu
          cache-on-failure: true

      - name: Run cargo test
        run: cargo test --manifest-path "src-tauri/Cargo.toml"

      - name: Run cargo clippy
        run: cargo clippy --manifest-path "src-tauri/Cargo.toml"
